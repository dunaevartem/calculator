stages:
  - build
  - test
  - push
  - deploy

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA

# 1. Сборка бинарника
build_app:
  stage: build
  tags:
    - build
  image: golang:1.24.0
  script:
    - go build -o app
  artifacts:
    paths:
      - app

# 2. Тестирование (вернули стадию)
test_app:
  stage: test
  tags:
    - test
  image: golang:1.24.0
  script:
    - go test ./...

# 3. Сборка образа через Kaniko (без привилегий)
build_image:
  stage: push
  tags:
    - push
  image:
    name: gcr.io/kaniko-project/executor:debug
    entrypoint: [""]
  script:
    - mkdir -p /kaniko/.docker
    - echo "{\"auths\":{\"$CI_REGISTRY\":{\"auth\":\"$(printf "%s:%s" "$CI_REGISTRY_USER" "$CI_REGISTRY_PASSWORD" | base64 | tr -d '\n')\"}}}" > /kaniko/.docker/config.json
    - /kaniko/executor
      --context "${CI_PROJECT_DIR}"
      --dockerfile "${CI_PROJECT_DIR}/Dockerfile"
      --destination "${IMAGE_TAG}"

# 4. Деплой через Helm
deploy_k8s:
  stage: deploy
  tags:
    - deploy
  image: alpine/helm:latest
  script:
    - mkdir -p ~/.kube
    - echo "$KUBECONFIG_FILE" > ~/.kube/config
    - chmod 600 ~/.kube/config
    - helm upgrade --install go-app ./charts/go-app 
        --namespace default 
        --set image.repository=$IMAGE_TAG 
        --wait
  only:
    - master
